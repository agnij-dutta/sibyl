################################################################################
# Sibyl Local Development Infrastructure
################################################################################
# Start everything:  docker compose -f infra/docker-compose.yml up -d
# Stop everything:   docker compose -f infra/docker-compose.yml down
# Nuke volumes:      docker compose -f infra/docker-compose.yml down -v
################################################################################

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16 - Primary relational store (mirrors Neon in production)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: sibyl
      POSTGRES_USER: sibyl
      POSTGRES_PASSWORD: sibyl_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sibyl -d sibyl']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Redis 7 - Caching, pub/sub, rate-limiting, and background job queues
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # ClickHouse 24.1 - High-volume telemetry storage (events + spans)
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - '8123:8123'   # HTTP interface
      - '9000:9000'   # Native TCP interface
    environment:
      CLICKHOUSE_DB: sibyl
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ''
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD', 'clickhouse-client', '--query', 'SELECT 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # --------------------------------------------------------------------------
  # Qdrant 1.12 - Vector database for semantic search over events
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - '6333:6333'   # REST API
      - '6334:6334'   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:6333/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  qdrant_data:
